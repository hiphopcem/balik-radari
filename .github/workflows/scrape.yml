name: Balik Radari Guncelleme

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutuphaneleri Yukle
        run: pip install requests beautifulsoup4 lxml

      - name: Scraper Calistir
        run: python scraper.py

      - name: Git Ayarla
        run: |
          git config user.email "bot@github.com"
          git config user.name "BalikBot"

      - name: Commit ve Push
        run: |
          git add data/reports.json
          git diff --staged --quiet || git commit -m "Otomatik guncelleme"
          git push
