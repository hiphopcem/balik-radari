<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canlı Balık Radarı 🎣</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#0a1628; color:#e0f0ff; }
#app { display:flex; flex-direction:column; height:100vh; min-height:650px; position:relative; }

/* HEADER */
#header {
  background:linear-gradient(135deg,#0d2137,#1a3a5c);
  padding:10px 16px; display:flex; align-items:center;
  justify-content:space-between; border-bottom:1px solid #1e4a7a;
  flex-shrink:0; gap:10px;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { font-size:26px; }
.logo-text h1 { font-size:16px; font-weight:700; color:#4fc3f7; letter-spacing:.5px; }
.logo-text p { font-size:11px; color:#7ab3d4; }
.live-badge { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; }
#pulse-dot { width:10px; height:10px; border-radius:50%; background:#00e676; box-shadow:0 0 8px #00e676; animation:pulse 1.5s infinite; }

/* FILTERS */
#filters {
  background:#0d1f35; padding:8px 16px;
  display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  border-bottom:1px solid #1e4a7a; flex-shrink:0;
}
.fbtn { background:#112840; border:1px solid #1e4a7a; color:#7ab3d4; padding:4px 12px; border-radius:20px; font-size:12px; cursor:pointer; transition:all .2s; }
.fbtn:hover,.fbtn.active { background:#1565c0; border-color:#4fc3f7; color:#fff; }
#sbox { background:#112840; border:1px solid #1e4a7a; color:#e0f0ff; padding:4px 12px; border-radius:20px; font-size:12px; outline:none; width:170px; }
#sbox::placeholder { color:#4a7a9b; }

/* MAIN */
#main { display:flex; flex:1; overflow:hidden; }
#map { flex:1; z-index:1; }

/* SIDEBAR */
#sidebar {
  width:300px; background:#0d1f35;
  border-left:1px solid #1e4a7a;
  display:flex; flex-direction:column;
  overflow:hidden; flex-shrink:0;
}
#sb-header {
  padding:10px 14px; border-bottom:1px solid #1e4a7a;
  display:flex; justify-content:space-between; align-items:center;
}
#sb-header h3 { font-size:13px; color:#4fc3f7; font-weight:600; }
#rcount { background:#1565c0; padding:2px 8px; border-radius:10px; font-size:11px; color:#fff; }
#rlist { flex:1; overflow-y:auto; padding:8px; }
#rlist::-webkit-scrollbar { width:4px; }
#rlist::-webkit-scrollbar-thumb { background:#1e4a7a; border-radius:2px; }

/* CARDS */
.rcard {
  background:#112840; border:1px solid #1e4a7a;
  border-radius:8px; padding:10px; margin-bottom:8px;
  cursor:pointer; transition:all .2s; animation:fadeIn .3s ease;
}
.rcard:hover { border-color:#4fc3f7; background:#142f50; }
.rcard.hot { border-left:3px solid #ff6b35; }
.ctop { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
.ftags { display:flex; gap:4px; flex-wrap:wrap; }
.ftag { background:#1565c0; color:#b3d9ff; padding:2px 7px; border-radius:10px; font-size:11px; font-weight:600; }
.ftag.ht { background:#b71c1c; color:#ffcdd2; }
.tbadge { font-size:10px; color:#7ab3d4; white-space:nowrap; }
.lname { font-size:12px; font-weight:600; color:#e0f0ff; margin-bottom:3px; }
.rnote { font-size:11px; color:#7ab3d4; line-height:1.4; }
.sbadge { display:inline-block; margin-top:5px; font-size:10px; color:#4a7a9b; border:1px solid #1e4a7a; padding:1px 6px; border-radius:8px; }
.hbar { display:flex; gap:2px; margin-top:5px; }
.hdot { width:8px; height:8px; border-radius:50%; background:#1e4a7a; }
.hdot.on { background:#ff6b35; box-shadow:0 0 4px #ff6b35; }

/* FORM */
#formpanel { border-top:1px solid #1e4a7a; padding:10px; background:#091525; }
#formpanel h4 { font-size:12px; color:#4fc3f7; margin-bottom:8px; }
.frow { display:flex; gap:6px; margin-bottom:6px; }
.fi { background:#112840; border:1px solid #1e4a7a; color:#e0f0ff; padding:5px 8px; border-radius:6px; font-size:11px; flex:1; outline:none; }
.fi::placeholder { color:#4a7a9b; }
.sbtn { background:#1565c0; color:#fff; border:none; padding:7px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; width:100%; }
.sbtn:hover { background:#1976d2; }

/* STATS */
#statsbar {
  background:#091525; padding:6px 16px;
  display:flex; gap:16px; flex-wrap:wrap; align-items:center;
  border-top:1px solid #1e4a7a; font-size:11px; color:#7ab3d4; flex-shrink:0;
}
.sv { color:#4fc3f7; font-weight:600; }

/* LOADING */
#loader {
  position:absolute; inset:0;
  background:rgba(10,22,40,.92);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:9999;
}
.spin { width:42px; height:42px; border:3px solid #1e4a7a; border-top-color:#4fc3f7; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:14px; }

/* POPUP */
.leaflet-popup-content-wrapper { background:#0d2137 !important; border:1px solid #1e4a7a !important; color:#e0f0ff !important; border-radius:10px !important; box-shadow:0 4px 20px rgba(0,0,0,.6) !important; }
.leaflet-popup-tip { background:#0d2137 !important; }
.pt { font-size:13px; font-weight:700; color:#4fc3f7; margin-bottom:5px; }
.pf { font-size:12px; color:#b3d9ff; margin-bottom:4px; }
.pm { font-size:11px; color:#7ab3d4; }

/* ANIMATIONS */
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.5)} }
@keyframes radarPing { 0%{transform:scale(1);opacity:.9} 100%{transform:scale(3.2);opacity:0} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:680px){ #sidebar{display:none;} }
</style>
</head>
<body>
<div id="app">

  <!-- YÜKLEME EKRANI -->
  <div id="loader">
    <div class="spin"></div>
    <div style="color:#4fc3f7;font-size:14px;margin-bottom:6px">Balık noktaları yükleniyor...</div>
    <div style="color:#7ab3d4;font-size:11px">Türkiye geneli taranıyor</div>
  </div>

  <!-- HEADER -->
  <div id="header">
    <div class="logo">
      <div class="logo-icon">🎣</div>
      <div class="logo-text">
        <h1>CANLI BALIK RADARI</h1>
        <p>Türkiye Balıkçılık Rapor Ağı</p>
      </div>
    </div>
    <div style="text-align:center">
      <div class="live-badge">
        <div id="pulse-dot"></div>
        <span id="livelabel" style="color:#ffa726">YÜKLÜYOR</span>
      </div>
      <div style="font-size:11px;color:#7ab3d4;margin-top:2px">Sonraki: <span id="cdtimer">3:00:00</span></div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-size:10px;color:#7ab3d4">Son güncelleme</div>
      <div id="lastup" style="font-size:11px;color:#4fc3f7;font-weight:600">—</div>
    </div>
  </div>

  <!-- FİLTRELER -->
  <div id="filters">
    <input id="sbox" placeholder="🔍 Yer veya balık ara..." oninput="renderAll()">
    <button class="fbtn active" onclick="setF('all',this)">Tümü</button>
    <button class="fbtn" onclick="setF('deniz',this)">🌊 Deniz</button>
    <button class="fbtn" onclick="setF('göl',this)">🏞️ Göl</button>
    <button class="fbtn" onclick="setF('nehir',this)">🌀 Baraj/Nehir</button>
    <button class="fbtn" onclick="setF('hot',this)">🔥 Aktif</button>
  </div>

  <!-- ANA ALAN -->
  <div id="main">
    <div id="map"></div>
    <div id="sidebar">
      <div id="sb-header">
        <h3>📋 Son Raporlar</h3>
        <span id="rcount">—</span>
      </div>
      <div id="rlist">
        <div style="padding:20px;text-align:center;color:#4a7a9b;font-size:12px">Yükleniyor...</div>
      </div>
      <div id="formpanel">
        <h4>➕ Rapor Ekle</h4>
        <div class="frow">
          <input class="fi" id="floc" placeholder="Lokasyon adı">
          <input class="fi" id="ffish" placeholder="Balık türü">
        </div>
        <input class="fi" id="fnote" placeholder="Not (isteğe bağlı)" style="width:100%;margin-bottom:6px">
        <button class="sbtn" onclick="submitR()">📤 Rapor Gönder</button>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="statsbar">
    <span>📍 Aktif: <span class="sv" id="sactive">—</span></span>
    <span>🐟 Toplam: <span class="sv" id="stotal">—</span></span>
    <span>📡 <span class="sv">Forum + Haber + Kullanıcı</span></span>
    <span style="margin-left:auto">
      <button onclick="loadData()" style="background:#112840;border:1px solid #1e4a7a;color:#7ab3d4;padding:2px 12px;border-radius:10px;font-size:11px;cursor:pointer">🔄 Yenile</button>
    </span>
  </div>

</div>
<script>
// ── GITHUB AYARLARI (hiphopcem için hazır) ────────────────────────
const DATA_URL = "https://raw.githubusercontent.com/hiphopcem/balik-radari/main/data/reports.json";

// ── DEMO VERİ (GitHub erişilemezse kullanılır) ────────────────────
const DEMO = [
  {id:"d01",lat:41.15,lng:28.80,loc:"Büyükçekmece Gölü",fish:["Sazan","Turna"],note:"Sabah erken saatlerde harika avlanma. Sazan çok bol.",heat:5,type:"göl",time:"2s önce",source:"Demo",hot:true},
  {id:"d02",lat:40.98,lng:29.14,loc:"Bostancı Sahili",fish:["Lüfer","İstavrit"],note:"Lüfer girişi başladı, akşam üstü çok aktif.",heat:4,type:"deniz",time:"45dk önce",source:"Demo",hot:true},
  {id:"d03",lat:40.65,lng:30.40,loc:"Sapanca Gölü",fish:["Alabalık","Sazan","Yayın"],note:"Sabah 6-9 arası alabalık çok aktif. Solucan iyi.",heat:5,type:"göl",time:"55dk önce",source:"Demo",hot:true},
  {id:"d04",lat:38.40,lng:27.10,loc:"İzmir Körfezi - Urla",fish:["Çipura","Levrek","Karagöz"],note:"Sabah çipura harika tuttu. Kalamaki iyi çalışıyor.",heat:5,type:"deniz",time:"30dk önce",source:"Demo",hot:true},
  {id:"d05",lat:38.05,lng:27.30,loc:"Kuşadası Körfezi",fish:["Lüfer","Palamut"],note:"Palamut girişi başladı! Zıpkın ile de tutuldu.",heat:5,type:"deniz",time:"1s önce",source:"Demo",hot:true},
  {id:"d06",lat:37.78,lng:38.28,loc:"Atatürk Barajı",fish:["Yayın","Sazan","Sudak"],note:"Dev yayın sezonu açık. Tekne ile gidilmeli.",heat:5,type:"nehir",time:"2s önce",source:"Demo",hot:true},
  {id:"d07",lat:41.00,lng:39.72,loc:"Trabzon - Yomra Sahili",fish:["Hamsi","Istavrit"],note:"Hamsi sürüsü geldi! Kepçe ile bile tutuluyor.",heat:5,type:"deniz",time:"15dk önce",source:"Demo",hot:true},
  {id:"d08",lat:40.20,lng:26.40,loc:"Çanakkale Boğazı",fish:["Palamut","Lüfer","Kolyoz"],note:"Göç dönemi. Palamut akını devam ediyor.",heat:5,type:"deniz",time:"1s önce",source:"Demo",hot:true},
  {id:"d09",lat:39.80,lng:32.70,loc:"Mogan Gölü - Ankara",fish:["Sazan","Sudak"],note:"Sudak aktif, sürpriz yaptı.",heat:4,type:"göl",time:"1s önce",source:"Demo",hot:false},
  {id:"d10",lat:38.70,lng:39.50,loc:"Keban Barajı",fish:["Yayın","Sudak"],note:"Sudak ve yayın. Dip olta.",heat:4,type:"nehir",time:"3s önce",source:"Demo",hot:false},
  {id:"d11",lat:41.18,lng:29.07,loc:"Beykoz Sahili",fish:["Kalkan","Barbun"],note:"Dip olta ile barbun kolay tutuluyor.",heat:4,type:"deniz",time:"2s önce",source:"Demo",hot:false},
  {id:"d12",lat:36.88,lng:30.70,loc:"Antalya Körfezi - Lara",fish:["Levrek","Kefal"],note:"Akşam levrek aktif. Lara sahili.",heat:4,type:"deniz",time:"40dk önce",source:"Demo",hot:false},
  {id:"d13",lat:37.05,lng:27.45,loc:"Bodrum - Yalıkavak",fish:["Çipura","Sargoz"],note:"Yalıkavak iskelesi. Sargoz aktif.",heat:3,type:"deniz",time:"2s önce",source:"Demo",hot:false},
  {id:"d14",lat:40.50,lng:31.60,loc:"Abant Gölü",fish:["Alabalık"],note:"Doğal alabalık. Sinek oltasıyla harika.",heat:3,type:"göl",time:"4s önce",source:"Demo",hot:false},
  {id:"d15",lat:41.67,lng:26.57,loc:"Ergene Nehri - Edirne",fish:["Sazan","Yayın","Turna"],note:"Yayın sezonu açık. Canlı yem ile başarılı.",heat:4,type:"nehir",time:"2s önce",source:"Demo",hot:false},
  {id:"d16",lat:39.90,lng:41.25,loc:"Tortum Gölü - Erzurum",fish:["Alabalık"],note:"Dağ alabalığı. Soğuk su balığı.",heat:3,type:"göl",time:"6s önce",source:"Demo",hot:false},
  {id:"d17",lat:41.26,lng:36.35,loc:"Samsun - Terme Nehri",fish:["Kefal","Sazan"],note:"Tatlı su-tuzlu su geçişi aktif.",heat:3,type:"nehir",time:"4s önce",source:"Demo",hot:false},
  {id:"d18",lat:37.10,lng:36.20,loc:"Seyhan Barajı - Adana",fish:["Yayın","Sazan"],note:"Yayın sezonu iyi gidiyor.",heat:4,type:"nehir",time:"3s önce",source:"Demo",hot:false},
  {id:"d19",lat:40.76,lng:29.92,loc:"İzmit Körfezi - Karamürsel",fish:["Çipura","Levrek"],note:"Kafes yanlarında levrek aktif.",heat:3,type:"deniz",time:"3s önce",source:"Demo",hot:false},
  {id:"d20",lat:39.95,lng:32.85,loc:"Eymir Gölü",fish:["Sazan","Kızılkanat"],note:"Kızılkanat sürü halinde geliyor.",heat:2,type:"göl",time:"5s önce",source:"Demo",hot:false},
];

// ── DURUM ─────────────────────────────────────────────────────────
let REPORTS = [];
let activeF = 'all';
let markers = {};
let map;
let csecs = 10800;
let userR = [];
try { userR = JSON.parse(localStorage.getItem('fishReports') || '[]'); } catch(e){}

// ── HARİTA ────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { center:[39.0,35.0], zoom:6 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CartoDB',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);
}

// ── VERİ YÜKLE ────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?nocache=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    REPORTS = [...(data.reports || []), ...userR];
    if (data.last_updated) {
      const d = new Date(data.last_updated);
      document.getElementById('lastup').textContent =
        d.toLocaleString('tr-TR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    }
    document.getElementById('livelabel').textContent = 'CANLI';
    document.getElementById('livelabel').style.color = '#00e676';
    document.getElementById('pulse-dot').style.background = '#00e676';
    document.getElementById('pulse-dot').style.boxShadow = '0 0 8px #00e676';
  } catch(e) {
    REPORTS = [...DEMO, ...userR];
    document.getElementById('lastup').textContent = 'Demo mod';
    document.getElementById('livelabel').textContent = 'DEMO';
    document.getElementById('livelabel').style.color = '#ffa726';
    document.getElementById('pulse-dot').style.background = '#ffa726';
    document.getElementById('pulse-dot').style.boxShadow = '0 0 8px #ffa726';
  }
  document.getElementById('loader').style.display = 'none';
  renderAll();
  updateStats();
}

// ── MARKER ────────────────────────────────────────────────────────
function getIcon(r) {
  const C = { deniz:'#29b6f6', göl:'#66bb6a', nehir:'#ffa726' };
  const c = C[r.type] || '#e0f0ff';
  const s = r.hot ? 20 : 13;
  const glow = r.hot ? `box-shadow:0 0 12px ${c},0 0 24px ${c}60;` : '';
  const ping = r.hot
    ? `<div style="position:absolute;top:-5px;left:-5px;width:${s+10}px;height:${s+10}px;
        border-radius:50%;border:2px solid ${c};
        animation:radarPing 2s ease-out infinite;"></div>` : '';
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;width:${s}px;height:${s}px;">
      ${ping}
      <div style="width:${s}px;height:${s}px;border-radius:50%;
        background:${c};${glow}
        border:2px solid rgba(255,255,255,.3);
        display:flex;align-items:center;justify-content:center;
        font-size:${Math.floor(s*.6)}px;">🐟</div>
    </div>`,
    iconSize:[s,s], iconAnchor:[s/2,s/2]
  });
}

// ── FİLTRE ────────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('sbox').value.toLowerCase();
  return REPORTS.filter(r => {
    if (activeF === 'hot') return r.hot;
    if (activeF !== 'all' && r.type !== activeF) return false;
    if (q) return r.loc.toLowerCase().includes(q) ||
                   (r.fish||[]).some(f => f.toLowerCase().includes(q));
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────────
function renderAll() {
  if (!map) return;
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const list = getFiltered();

  list.forEach(r => {
    const m = L.marker([r.lat, r.lng], { icon: getIcon(r) }).addTo(map);
    m.bindPopup(`
      <div class="pt">📍 ${r.loc}</div>
      <div class="pf">🐟 ${(r.fish||[]).join(', ')}</div>
      <div class="pm" style="margin-bottom:5px">${r.note}</div>
      <div style="display:flex;justify-content:space-between">
        <span class="pm">${r.time}</span>
        <span class="pm">📡 ${r.source}</span>
      </div>
      ${r.url ? `<a href="${r.url}" target="_blank" style="font-size:11px;color:#4fc3f7;display:block;margin-top:5px">🔗 Kaynağa git</a>` : ''}
    `, { maxWidth:250 });
    markers[r.id] = m;
  });

  renderList(list);
  document.getElementById('rcount').textContent = list.length + ' rapor';
}

function renderList(list) {
  const el = document.getElementById('rlist');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#4a7a9b;font-size:12px">Bu filtrede rapor bulunamadı.</div>';
    return;
  }
  list.slice().sort((a,b) => (b.heat||0) - (a.heat||0)).forEach(r => {
    const d = document.createElement('div');
    d.className = 'rcard' + (r.hot ? ' hot' : '');
    const dots = Array.from({length:5},(_,i) =>
      `<div class="hdot${i < (r.heat||0) ? ' on' : ''}"></div>`).join('');
    d.innerHTML = `
      <div class="ctop">
        <div class="ftags">
          ${(r.fish||[]).map((f,i) =>
            `<span class="ftag${i===0&&r.hot?' ht':''}">${f}</span>`).join('')}
        </div>
        <span class="tbadge">${r.time||''}</span>
      </div>
      <div class="lname">📍 ${r.loc}</div>
      <div class="rnote">${r.note}</div>
      <div class="hbar">${dots}</div>
      <span class="sbadge">📡 ${r.source}</span>`;
    d.onclick = () => {
      map.flyTo([r.lat, r.lng], 11, {duration:1.2});
      setTimeout(() => markers[r.id] && markers[r.id].openPopup(), 1300);
    };
    el.appendChild(d);
  });
}

function setF(f, btn) {
  activeF = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function updateStats() {
  document.getElementById('sactive').textContent = REPORTS.filter(r => r.hot).length;
  document.getElementById('stotal').textContent = REPORTS.length;
}

// ── KULLANICI RAPORU ──────────────────────────────────────────────
function submitR() {
  const loc  = document.getElementById('floc').value.trim();
  const fish = document.getElementById('ffish').value.trim();
  const note = document.getElementById('fnote').value.trim();
  if (!loc || !fish) { alert('Lokasyon ve balık türü zorunludur!'); return; }

  const nr = {
    id: 'u' + Date.now(),
    lat: 37 + Math.random()*4,
    lng: 28 + Math.random()*12,
    loc, fish: fish.split(',').map(f => f.trim()),
    note: note || 'Kullanıcı raporu.',
    heat: 3, type: 'deniz',
    time: 'Az önce',
    timestamp: new Date().toISOString(),
    source: '👤 Kullanıcı', hot: false,
  };
  userR.unshift(nr);
  try { localStorage.setItem('fishReports', JSON.stringify(userR.slice(0,20))); } catch(e){}
  REPORTS.unshift(nr);
  document.getElementById('floc').value = '';
  document.getElementById('ffish').value = '';
  document.getElementById('fnote').value = '';
  renderAll();
  updateStats();
}

// ── SAYAÇ ─────────────────────────────────────────────────────────
setInterval(() => {
  csecs--;
  if (csecs <= 0) { csecs = 10800; loadData(); }
  const h = Math.floor(csecs/3600);
  const m = Math.floor((csecs%3600)/60);
  const s = csecs % 60;
  document.getElementById('cdtimer').textContent =
    h + ':' + m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
}, 1000);

// ── BAŞLAT ────────────────────────────────────────────────────────
window.onload = () => { initMap(); loadData(); };
</script>
