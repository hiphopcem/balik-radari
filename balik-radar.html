<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sihirli Zoka Radar | Canlı Balık Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg-deep:  #020d18;
  --bg-panel: #040f1e;
  --bg-card:  #071828;
  --bg-hover: #0a2035;
  --accent:   #00d4ff;
  --accent2:  #00ff88;
  --accent3:  #ff6b35;
  --gold:     #f0c040;
  --border:   rgba(0,212,255,0.15);
  --border2:  rgba(0,212,255,0.3);
  --text:     #c8e8f8;
  --text-dim: #5a8aaa;
  --text-muted:#2a5570;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Exo 2',sans-serif;background:var(--bg-deep);color:var(--text);}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

/* HEADER */
#header{
  background:linear-gradient(180deg,rgba(2,13,24,0.98),rgba(4,15,30,0.95));
  border-bottom:1px solid var(--border2);
  padding:0 20px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
#header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.logo-wrap{display:flex;align-items:center;gap:14px;}
.logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,255,136,0.1));
  border:1px solid var(--border2);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  animation:iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse{
  0%,100%{box-shadow:0 0 10px rgba(0,212,255,0.3);}
  50%{box-shadow:0 0 25px rgba(0,212,255,0.6),0 0 50px rgba(0,212,255,0.2);}
}
.logo-title{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:2px;text-shadow:0 0 20px rgba(0,212,255,0.5);}
.logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
.live-pill{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);
  border-radius:20px;padding:5px 14px;
}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:livePulse 1.5s infinite;}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.5);}}
.live-text{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:var(--accent2);letter-spacing:2px;}
.countdown-label{font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
.countdown-val{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);letter-spacing:1px;}
.lu-label{font-size:9px;color:var(--text-muted);letter-spacing:1px;}
.lu-val{font-family:'Orbitron',monospace;font-size:11px;color:var(--gold);}

/* FILTER BAR */
#filterbar{
  background:rgba(4,15,30,0.9);border-bottom:1px solid var(--border);
  padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;
}
.search-wrap{position:relative;flex-shrink:0;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:12px;}
#sbox{
  background:rgba(0,212,255,0.05);border:1px solid var(--border);color:var(--text);
  padding:6px 10px 6px 30px;border-radius:6px;font-size:12px;
  font-family:'Exo 2',sans-serif;outline:none;width:180px;
  transition:border-color .2s,box-shadow .2s;
}
#sbox:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(0,212,255,0.2);}
#sbox::placeholder{color:var(--text-muted);}
.fgroup{display:flex;gap:6px;align-items:center;}
.fgroup-label{font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-right:2px;}
.fbtn{
  background:rgba(0,212,255,0.05);border:1px solid var(--border);color:var(--text-dim);
  padding:5px 12px;border-radius:5px;font-size:11px;font-family:'Exo 2',sans-serif;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;
}
.fbtn:hover{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent);}
.fbtn.active{background:rgba(0,212,255,0.15);border-color:var(--accent);color:var(--accent);box-shadow:0 0 10px rgba(0,212,255,0.2);}
.fbtn.fhot.active{background:rgba(255,107,53,0.15);border-color:var(--accent3);color:var(--accent3);box-shadow:0 0 10px rgba(255,107,53,0.2);}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;}
#map{flex:1;z-index:1;}

/* SIDEBAR */
#sidebar{
  width:320px;flex-shrink:0;
  background:rgba(4,15,30,0.97);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,212,255,0.03);
}
.sb-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;}
.sb-count{
  background:rgba(0,212,255,0.15);border:1px solid var(--border2);
  color:var(--accent);font-family:'Orbitron',monospace;
  font-size:10px;padding:2px 8px;border-radius:10px;
}
#rlist{flex:1;overflow-y:auto;padding:10px;}
#rlist::-webkit-scrollbar{width:3px;}
#rlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* CARDS */
.rcard{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden;
  animation:cardIn .3s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.rcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.3),transparent);
  opacity:0;transition:opacity .25s;
}
.rcard:hover{background:var(--bg-hover);border-color:var(--border2);transform:translateX(2px);}
.rcard:hover::before{opacity:1;}
.rcard.hot{border-left:2px solid var(--accent3);}
.rcard.hot::after{content:'🔥';position:absolute;top:8px;right:10px;font-size:12px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.fish-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1;margin-right:8px;}
.fish-tag{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);color:var(--accent);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
.fish-tag.primary{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.25);color:var(--accent2);}
.fish-tag.hot-fish{background:rgba(255,107,53,0.12);border-color:rgba(255,107,53,0.25);color:var(--accent3);}
.time-tag{font-size:9px;color:var(--text-muted);white-space:nowrap;font-family:'Orbitron',monospace;}
.loc-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.loc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.loc-dot.deniz{background:var(--accent);box-shadow:0 0 6px var(--accent);}
.loc-dot.gol{background:var(--accent2);box-shadow:0 0 6px var(--accent2);}
.loc-dot.nehir{background:var(--gold);box-shadow:0 0 6px var(--gold);}
.card-note{font-size:11px;color:var(--text-dim);line-height:1.5;margin-bottom:6px;}
.tackle-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.tackle-tag{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
.rod-tag{background:rgba(0,100,60,0.3);border:1px solid rgba(0,200,120,0.2);color:#4dd;}
.bait-tag{background:rgba(100,60,0,0.3);border:1px solid rgba(200,120,0,0.2);color:#fa6;}
.heat-row{display:flex;align-items:center;gap:6px;}
.heat-bar{display:flex;gap:2px;}
.hdot{width:10px;height:3px;border-radius:2px;background:rgba(255,107,53,0.15);}
.hdot.on{background:var(--accent3);box-shadow:0 0 4px var(--accent3);}
.source-tag{font-size:9px;color:var(--text-muted);margin-left:auto;letter-spacing:.5px;}

/* FORM */
#form-panel{border-top:1px solid var(--border);padding:12px;background:rgba(0,0,0,0.3);flex-shrink:0;}
.form-title{
  font-family:'Orbitron',monospace;font-size:10px;
  color:var(--accent);letter-spacing:2px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.form-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
.frow{display:flex;gap:6px;margin-bottom:6px;}
.fi{
  background:rgba(0,212,255,0.05);border:1px solid var(--border);color:var(--text);
  padding:6px 9px;border-radius:5px;font-size:11px;font-family:'Exo 2',sans-serif;
  flex:1;outline:none;transition:border-color .2s;
}
.fi:focus{border-color:var(--accent);}
.fi::placeholder{color:var(--text-muted);}
.fselect{
  background:rgba(0,212,255,0.05);border:1px solid var(--border);color:var(--text);
  padding:6px 9px;border-radius:5px;font-size:11px;font-family:'Exo 2',sans-serif;
  flex:1;outline:none;cursor:pointer;
}
.fselect option{background:#071828;}
.submit-btn{
  width:100%;padding:8px;
  background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(0,255,136,0.08));
  border:1px solid var(--border2);color:var(--accent);
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  letter-spacing:2px;border-radius:6px;cursor:pointer;
  transition:all .2s;margin-top:2px;
}
.submit-btn:hover{background:linear-gradient(135deg,rgba(0,212,255,0.25),rgba(0,255,136,0.15));box-shadow:0 0 15px rgba(0,212,255,0.3);}

/* STATS BAR */
#statsbar{
  background:rgba(2,13,24,0.98);border-top:1px solid var(--border);
  padding:6px 20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;flex-shrink:0;position:relative;
}
#statsbar::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.stat-item{display:flex;align-items:center;gap:6px;}
.stat-label{font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
.stat-val{font-family:'Orbitron',monospace;font-size:12px;color:var(--accent);}
.stat-val.green{color:var(--accent2);}
.stat-val.orange{color:var(--accent3);}
.refresh-btn{
  margin-left:auto;background:rgba(0,212,255,0.08);border:1px solid var(--border);
  color:var(--text-dim);padding:3px 12px;border-radius:4px;font-size:10px;
  font-family:'Exo 2',sans-serif;cursor:pointer;transition:all .2s;
}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

/* LOADER */
#loader{
  position:fixed;inset:0;background:var(--bg-deep);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;
}
.loader-radar{width:120px;height:120px;border-radius:50%;border:1px solid rgba(0,212,255,0.2);position:relative;margin-bottom:24px;}
.loader-radar::before,.loader-radar::after{content:'';position:absolute;inset:0;border-radius:50%;border:1px solid rgba(0,212,255,0.1);}
.loader-radar::before{transform:scale(0.6);}
.loader-radar::after{transform:scale(0.3);}
.loader-sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 70%,rgba(0,212,255,0.3) 100%);animation:sweep 2s linear infinite;}
@keyframes sweep{to{transform:rotate(360deg);}}
.loader-dot{position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);box-shadow:0 0 15px var(--accent);}
.loader-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--accent);letter-spacing:4px;margin-bottom:6px;text-shadow:0 0 20px rgba(0,212,255,0.5);}
.loader-sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;}
.loader-bar{width:200px;height:2px;background:rgba(0,212,255,0.1);border-radius:2px;margin-top:20px;overflow:hidden;}
.loader-bar-fill{height:100%;background:linear-gradient(90deg,transparent,var(--accent));animation:barAnim 1.5s ease-in-out infinite;}
@keyframes barAnim{0%{width:0;margin-left:0;}50%{width:60%;}100%{width:0;margin-left:100%;}}

/* POPUP */
.leaflet-popup-content-wrapper{background:rgba(4,15,30,0.97)!important;border:1px solid var(--border2)!important;border-radius:10px!important;box-shadow:0 10px 40px rgba(0,0,0,0.7),0 0 20px rgba(0,212,255,0.15)!important;padding:0!important;}
.leaflet-popup-tip-container{display:none;}
.leaflet-popup-content{margin:0!important;}
.popup-inner{padding:14px 16px;min-width:220px;}
.popup-loc{font-family:'Orbitron',monospace;font-size:12px;color:var(--accent);margin-bottom:8px;letter-spacing:1px;}
.popup-fish{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.popup-tag{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);color:var(--accent);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
.popup-tackle{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.popup-note{font-size:11px;color:var(--text-dim);line-height:1.5;margin-bottom:8px;}
.popup-footer{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);}

/* ANIMATIONS */
@keyframes radarPing{0%{transform:scale(1);opacity:.8;}100%{transform:scale(4);opacity:0;}}
@keyframes hotGlow{0%,100%{filter:brightness(1);}50%{filter:brightness(1.4);}}
@media(max-width:700px){#sidebar{display:none;}}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-radar">
    <div class="loader-sweep"></div>
    <div class="loader-dot"></div>
  </div>
  <div class="loader-title">SİHİRLİ ZOKA</div>
  <div class="loader-sub">CANLI BALIK RADARI BAŞLIYOR</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="app">
  <div id="header">
    <div class="logo-wrap">
      <div class="logo-icon">🎣</div>
      <div>
        <div class="logo-title">SİHİRLİ ZOKA RADAR</div>
        <div class="logo-sub">Canlı Balık Takip Sistemi</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:20px;">
      <div class="live-pill">
        <div class="live-dot" id="live-dot"></div>
        <div class="live-text" id="live-label">BAĞLANIYOR</div>
      </div>
      <div style="text-align:center;">
        <div class="countdown-label">Sonraki Güncelleme</div>
        <div class="countdown-val" id="cdtimer">3:00:00</div>
      </div>
    </div>
    <div style="text-align:right;">
      <div class="lu-label">Son Güncelleme</div>
      <div class="lu-val" id="lastup">—</div>
    </div>
  </div>

  <div id="filterbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="sbox" placeholder="Yer veya balık ara..." oninput="renderAll()">
    </div>
    <div class="fgroup">
      <span class="fgroup-label">Bölge</span>
      <button class="fbtn active" onclick="setF('all',this)">Tümü</button>
      <button class="fbtn" onclick="setF('deniz',this)">🌊 Deniz</button>
      <button class="fbtn" onclick="setF('göl',this)">🏞 Göl</button>
      <button class="fbtn" onclick="setF('nehir',this)">🌀 Nehir</button>
    </div>
    <div class="fgroup">
      <span class="fgroup-label">Olta</span>
      <button class="fbtn" onclick="setF('spin',this)">Spin</button>
      <button class="fbtn" onclick="setF('lrf',this)">LRF</button>
      <button class="fbtn" onclick="setF('surf',this)">Surf</button>
      <button class="fbtn" onclick="setF('jigging',this)">Jigging</button>
    </div>
    <button class="fbtn fhot" onclick="setF('hot',this)">🔥 Aktif Noktalar</button>
  </div>

  <div id="main">
    <div id="map"></div>
    <div id="sidebar">
      <div class="sb-header">
        <div class="sb-title">SON RAPORLAR</div>
        <div class="sb-count" id="rcount">—</div>
      </div>
      <div id="rlist"><div style="padding:30px;text-align:center;color:var(--text-muted);font-size:12px;letter-spacing:1px">YÜKLENİYOR...</div></div>
      <div id="form-panel">
        <div class="form-title">RAPOR EKLE</div>
        <div class="frow">
          <input class="fi" id="floc" placeholder="Lokasyon adı">
          <input class="fi" id="ffish" placeholder="Balık türü">
        </div>
        <div class="frow">
          <select class="fselect" id="frod">
            <option value="">Olta türü...</option>
            <option>Spin</option><option>LRF</option><option>Surf</option>
            <option>Feeder</option><option>Jigging</option><option>Trolling</option>
            <option>Fly</option><option>Bolentino</option><option>Zıpkın</option><option>Olta</option>
          </select>
          <input class="fi" id="fbait" placeholder="Yem">
        </div>
        <input class="fi" id="fnote" placeholder="Not (isteğe bağlı)" style="width:100%;margin-bottom:6px">
        <button class="submit-btn" onclick="submitR()">▶ RAPOR GÖNDER</button>
      </div>
    </div>
  </div>

  <div id="statsbar">
    <div class="stat-item"><span class="stat-label">Aktif</span><span class="stat-val orange" id="s-active">—</span></div>
    <div class="stat-item"><span class="stat-label">Toplam</span><span class="stat-val" id="s-total">—</span></div>
    <div class="stat-item"><span class="stat-label">Kapsama</span><span class="stat-val green">İstanbul · Marmara · Ege · Çanakkale</span></div>
    <button class="refresh-btn" onclick="loadData()">↻ Yenile</button>
  </div>
</div>

<!-- Leaflet önce yüklenmeli, sonra kod çalışmalı -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DATA_URL = "https://raw.githubusercontent.com/hiphopcem/balik-radari/main/data/reports.json";

const DEMO = [

  {id:"d03",lat:41.02250,lng:28.97400,loc:"Karaköy",fish:["Lüfer","Levrek"],rod:"Spin",bait:"Küçük kaşık",note:"Karaköy iskelesi. Sabah lüfer çıktı.",heat:4,type:"deniz",time:"1s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d04",lat:41.19870,lng:29.06220,loc:"Rumeli Kavağı",fish:["Palamut","Lüfer","Torik"],rod:"Trolling",bait:"CD-11 Rapala",note:"Rumeli Kavağı. Torik ve palamut aktif.",heat:5,type:"deniz",time:"2s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d05",lat:41.16650,lng:29.05300,loc:"Sarıyer",fish:["Lüfer","Palamut"],rod:"Spin",bait:"Mepps No:3",note:"Sarıyer açıkları. Lüfer girişi başladı.",heat:4,type:"deniz",time:"1s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d06",lat:40.97810,lng:27.51170,loc:"Tekirdağ",fish:["Lüfer","Palamut","Kolyoz"],rod:"Surf",bait:"Çoklu iğne takımı",note:"Tekirdağ sahili. Palamut geçişi var.",heat:4,type:"deniz",time:"1s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d07",lat:39.83200,lng:26.06400,loc:"Bozcaada",fish:["Çipura","Levrek","Sargoz","Lahos"],rod:"LRF",bait:"Micro jig, gulp",note:"Bozcaada etrafı berrak su, çipura bol.",heat:5,type:"deniz",time:"2s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d08",lat:40.17800,lng:25.90000,loc:"Gökçeada",fish:["Çipura","Levrek","Lahos","Grida"],rod:"Jigging",bait:"Silikon, jig",note:"Gökçeada dipten güzel balıklar tutuluyor.",heat:5,type:"deniz",time:"3s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d09",lat:39.31760,lng:26.69630,loc:"Ayvalık",fish:["Çipura","Levrek","Sargoz"],rod:"LRF",bait:"Micro jig, silikon",note:"Ayvalık adaları etrafı harika.",heat:5,type:"deniz",time:"1s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d10",lat:40.72000,lng:30.20000,loc:"Sapanca Gölü",fish:["Alabalık","Sazan","Yayın"],rod:"Spin",bait:"Rapala, solucan",note:"Sapanca sabah alabalık harika.",heat:5,type:"göl",time:"55dk önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d11",lat:41.06000,lng:28.59000,loc:"Büyükçekmece Gölü",fish:["Sazan","Turna","Kefal"],rod:"Feeder",bait:"Mısır, solucan",note:"Büyükçekmece Gölü sazan sezonu açık.",heat:5,type:"göl",time:"2s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d12",lat:40.15460,lng:26.40860,loc:"Çanakkale",fish:["Lüfer","Palamut","Kolyoz"],rod:"Trolling",bait:"Rapala",note:"Çanakkale Boğazı göç dönemi aktif.",heat:5,type:"deniz",time:"1s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d13",lat:40.43300,lng:29.55000,loc:"İznik Gölü",fish:["Sazan","Levrek","Sudak"],rod:"Feeder",bait:"Pellet, mısır",note:"İznik gölü sazan sezonu açık.",heat:4,type:"göl",time:"4s önce",source:"Sihirli Zoka Radar",hot:false},
  {id:"d14",lat:40.55000,lng:26.60000,loc:"Saros Körfezi",fish:["Çipura","Levrek","Sargoz"],rod:"LRF",bait:"Micro jig",note:"Saros körfezi temiz su, çipura bol.",heat:4,type:"deniz",time:"2s önce",source:"Sihirli Zoka Radar",hot:true},
  {id:"d15",lat:41.67710,lng:26.55570,loc:"Edirne - Meriç",fish:["Sazan","Yayın","Turna"],rod:"Feeder",bait:"Boilie, canlı balık",note:"Meriç nehrinde yayın sezonu.",heat:4,type:"nehir",time:"2s önce",source:"Sihirli Zoka Radar",hot:true},
];

let REPORTS=[], activeF='all', markers={}, map, csecs=10800;
let userR=[];
try{ userR=JSON.parse(localStorage.getItem('szr_reports')||'[]'); }catch(e){}

function initMap(){
  map = L.map('map',{center:[39.8,28.5],zoom:6,zoomControl:false});
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OSM © CartoDB',subdomains:'abcd',maxZoom:19
  }).addTo(map);
}

async function loadData(){
  try{
    const res = await fetch(DATA_URL+'?t='+Date.now());
    if(!res.ok) throw 0;
    const data = await res.json();
    REPORTS = [...(data.reports||[]),...userR];
    if(data.last_updated){
      const d = new Date(data.last_updated);
      document.getElementById('lastup').textContent =
        d.toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    }
    setLive(true);
  }catch(e){
    REPORTS = [...DEMO,...userR];
    document.getElementById('lastup').textContent='Demo';
    setLive(false);
  }
  document.getElementById('loader').style.display='none';
  renderAll(); updateStats();
}

function setLive(ok){
  const dot=document.getElementById('live-dot');
  const lbl=document.getElementById('live-label');
  if(ok){
    dot.style.background='#00ff88';dot.style.boxShadow='0 0 8px #00ff88';
    lbl.textContent='CANLI';lbl.style.color='#00ff88';
  }else{
    dot.style.background='#f0c040';dot.style.boxShadow='0 0 8px #f0c040';
    lbl.textContent='DEMO';lbl.style.color='#f0c040';
  }
}

function getIcon(r){
  const C={deniz:'#00d4ff',göl:'#00ff88',nehir:'#f0c040'};
  const c=C[r.type]||'#c8e8f8';
  const s=r.hot?20:12;
  const glow=r.hot?`box-shadow:0 0 12px ${c},0 0 24px ${c}60;`:'';
  const ping=r.hot?`
    <div style="position:absolute;top:-6px;left:-6px;width:${s+12}px;height:${s+12}px;border-radius:50%;border:1.5px solid ${c};animation:radarPing 2s ease-out infinite;"></div>
    <div style="position:absolute;top:-3px;left:-3px;width:${s+6}px;height:${s+6}px;border-radius:50%;border:1px solid ${c};animation:radarPing 2s ease-out infinite .6s;"></div>`:'';
  const emoji=r.type==='göl'?'🐠':r.type==='nehir'?'🎣':'🐟';
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;width:${s}px;height:${s}px;">${ping}<div style="width:${s}px;height:${s}px;border-radius:50%;background:${c};${glow}border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:${Math.floor(s*.55)}px;">${emoji}</div></div>`,
    iconSize:[s,s],iconAnchor:[s/2,s/2]
  });
}

function getFiltered(){
  const q=document.getElementById('sbox').value.toLowerCase();
  const rodF=['spin','lrf','surf','jigging'];
  return REPORTS.filter(r=>{
    if(activeF==='hot') return r.hot;
    if(rodF.includes(activeF)) return (r.rod||'').toLowerCase()===activeF;
    if(activeF!=='all'&&r.type!==activeF) return false;
    if(q) return r.loc.toLowerCase().includes(q)||(r.fish||[]).some(f=>f.toLowerCase().includes(q));
    return true;
  });
}

function renderAll(){
  if(!map) return;
  Object.values(markers).forEach(m=>map.removeLayer(m)); markers={};
  const list=getFiltered();
  list.forEach(r=>{
    const m=L.marker([r.lat,r.lng],{icon:getIcon(r)}).addTo(map);
    const th=r.rod?`<span class="tackle-tag rod-tag">🎣 ${r.rod}</span>`:'';
    const tb=r.bait?`<span class="tackle-tag bait-tag">🪱 ${r.bait}</span>`:'';
    m.bindPopup(`<div class="popup-inner">
      <div class="popup-loc">📍 ${r.loc}</div>
      <div class="popup-fish">${(r.fish||[]).map(f=>`<span class="popup-tag">${f}</span>`).join('')}</div>
      ${th||tb?`<div class="popup-tackle">${th}${tb}</div>`:''}
      <div class="popup-note">${r.note||''}</div>
      <div class="popup-footer"><span>${r.time||''}</span><span>${r.source||''}</span></div>
    </div>`,{maxWidth:260});
    markers[r.id]=m;
  });
  renderList(list);
  document.getElementById('rcount').textContent=list.length+' rapor';
}

function renderList(list){
  const el=document.getElementById('rlist');
  el.innerHTML='';
  if(!list.length){
    el.innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:11px;letter-spacing:1px">BU FİLTREDE RAPOR YOK</div>';
    return;
  }
  list.slice().sort((a,b)=>(b.heat||0)-(a.heat||0)).forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='rcard'+(r.hot?' hot':'');
    d.style.animationDelay=(i*30)+'ms';
    const dots=Array.from({length:5},(_,j)=>`<div class="hdot${j<(r.heat||0)?' on':''}"></div>`).join('');
    const tc=r.type==='göl'?'gol':r.type==='nehir'?'nehir':'deniz';
    d.innerHTML=`
      <div class="card-top">
        <div class="fish-tags">${(r.fish||[]).map((f,j)=>`<span class="fish-tag${j===0&&r.hot?' hot-fish':j===0?' primary':''}">${f}</span>`).join('')}</div>
        <span class="time-tag">${r.time||''}</span>
      </div>
      <div class="loc-name"><div class="loc-dot ${tc}"></div>${r.loc}</div>
      <div class="card-note">${r.note||''}</div>
      ${r.rod||r.bait?`<div class="tackle-row">${r.rod?`<span class="tackle-tag rod-tag">🎣 ${r.rod}</span>`:''}${r.bait?`<span class="tackle-tag bait-tag">🪱 ${r.bait}</span>`:''}</div>`:''}
      <div class="heat-row"><div class="heat-bar">${dots}</div><span class="source-tag">${r.source||''}</span></div>`;
    d.onclick=()=>{
      map.flyTo([r.lat,r.lng],11,{duration:1.2});
      setTimeout(()=>markers[r.id]&&markers[r.id].openPopup(),1300);
    };
    el.appendChild(d);
  });
}

function setF(f,btn){
  activeF=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function updateStats(){
  document.getElementById('s-active').textContent=REPORTS.filter(r=>r.hot).length;
  document.getElementById('s-total').textContent=REPORTS.length;
}

function submitR(){
  const loc=document.getElementById('floc').value.trim();
  const fish=document.getElementById('ffish').value.trim();
  const rod=document.getElementById('frod').value;
  const bait=document.getElementById('fbait').value.trim();
  const note=document.getElementById('fnote').value.trim();
  if(!loc||!fish){alert('Lokasyon ve balık türü zorunludur!');return;}
  const nr={
    id:'u'+Date.now(),
    lat:39+Math.random()*3,lng:26+Math.random()*5,
    loc,fish:fish.split(',').map(f=>f.trim()),
    rod:rod||'',bait:bait||'',
    note:note||'Kullanıcı raporu.',
    heat:3,type:'deniz',time:'Az önce',
    timestamp:new Date().toISOString(),
    source:'Sihirli Zoka Radar',hot:false,
  };
  userR.unshift(nr);
  try{localStorage.setItem('szr_reports',JSON.stringify(userR.slice(0,20)));}catch(e){}
  REPORTS.unshift(nr);
  ['floc','ffish','fbait','fnote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('frod').value='';
  renderAll();updateStats();
}

setInterval(()=>{
  csecs--;
  if(csecs<=0){csecs=10800;loadData();}
  const h=Math.floor(csecs/3600),m=Math.floor((csecs%3600)/60),s=csecs%60;
  document.getElementById('cdtimer').textContent=h+':'+m.toString().padStart(2,'0')+':'+s.toString().padStart(2,'0');
},1000);

window.addEventListener('load',()=>{initMap();loadData();});
</script>
</body>
