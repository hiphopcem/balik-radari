[[edge_functions]]
  path = "/balik-radar.html"
  function = "protect"

[[edge_functions]]
  path = "/approve"
  function = "approve"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/*.json"
  [headers.values]
    Content-Type = "application/json; charset=UTF-8"
    Access-Control-Allow-Origin = "*"
